<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Schedule June 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; background: #0a0a0f; font-family: 'Sarabun', sans-serif; padding: 24px 16px; color: #fff; }
.header { text-align: center; margin-bottom: 20px; }
.title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px; color: #ff6b35; line-height: 1; }
.subtitle { font-size: 13px; color: #888; margin-top: 4px; letter-spacing: 2px; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #2a2a38; background: #1a1a24; color: #888; font-family: 'Sarabun', sans-serif; font-size: 13px; cursor: pointer; text-align: center; transition: all 0.2s; }
.tab.active { background: #ff6b35; border-color: #ff6b35; color: #fff; font-weight: 700; }
.strava-box { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.strava-box label { font-size: 13px; color: #aaa; display: block; margin-bottom: 8px; }
.strava-box input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #2a2a38; background: #0a0a0f; color: #fff; font-size: 16px; margin-bottom: 12px; font-family: 'Sarabun', sans-serif; }
.btn-orange { width: 100%; background: #ff6b35; color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 8px; display: block; }
.btn-green { width: 100%; background: #1a936f; color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 8px; display: block; }
.btn-ghost { width: 100%; background: transparent; color: #555; border: none; font-family: 'Sarabun', sans-serif; font-size: 12px; cursor: pointer; padding: 4px; margin-bottom: 12px; display: block; }
.strava-ok { text-align: center; font-size: 13px; color: #aaa; margin-bottom: 16px; }
.loading { text-align: center; color: #fc4c02; font-size: 13px; margin-bottom: 12px; }
.progress-box { background: #1a1a24; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #2a2a38; }
.progress-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
.progress-label { font-size: 13px; color: #aaa; }
.progress-km { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #ff6b35; }
.progress-bar { height: 8px; background: #2a2a38; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #ff6b35, #ffa040); border-radius: 4px; transition: width 0.4s; }
.progress-bottom { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: #666; }
.week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 5px; }
.day-btn { border-radius: 10px; padding: 8px 4px; text-align: center; cursor: pointer; transition: all 0.2s; border: none; }
.day-name { font-size: 10px; margin-bottom: 2px; }
.day-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; line-height: 1; }
.day-km { font-size: 11px; margin-top: 3px; font-weight: 600; }
.day-long { font-size: 8px; margin-top: 2px; color: #ffd700; letter-spacing: 1px; }
.summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 16px; }
.summary-card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 10px; padding: 14px 10px; text-align: center; }
.summary-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #ff6b35; }
.summary-label { font-size: 11px; color: #666; margin-top: 4px; }
.footer { text-align: center; margin-top: 16px; font-size: 12px; color: #444; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 12px; padding: 16px; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #ff6b35; }
.stat-unit { font-size: 12px; color: #888; margin-left: 4px; }
.stat-label { font-size: 12px; color: #666; margin-top: 4px; }
.chart-wrap { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.chart-title { font-size: 13px; color: #aaa; margin-bottom: 12px; }
.bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.bar { width: 100%; background: linear-gradient(180deg, #ff6b35, #ffa040); border-radius: 3px 3px 0 0; min-height: 2px; }
.bar.rest { background: #2a2a38; }
.bar-label { font-size: 8px; color: #555; }
.best-worst { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.bw-card { background: #1a1a24; border-radius: 12px; padding: 14px; border: 1px solid #2a2a38; }
.bw-title { font-size: 11px; color: #888; margin-bottom: 6px; }
.bw-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; }
.bw-sub { font-size: 11px; color: #666; margin-top: 2px; }
.no-data { text-align: center; padding: 40px 20px; color: #555; font-size: 14px; }
.weather-bar { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1e1e2e; }
.weather-date { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #ff6b35; width: 28px; }
.weather-icon-lg { font-size: 22px; width: 28px; text-align: center; }
.weather-info { flex: 1; }
.weather-temp { font-size: 13px; font-weight: 600; }
.weather-detail { font-size: 11px; color: #666; margin-top: 2px; }
.weather-tag { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.tag-hot { background: #ff3b3b22; color: #ff6b6b; }
.tag-rain { background: #3b7fff22; color: #6b9fff; }
.tag-wind { background: #3bffcc22; color: #6bffcc; }
.tag-good { background: #3bff7f22; color: #6bff9f; }
</style>
</head>
<body>

<div class="header">
  <div class="title">JULY 2026</div>
  <div class="subtitle">RUNNING SCHEDULE · TARGET 100 KM</div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-btn-calendar" onclick="showTab('calendar')">📅 ปฏิทิน</button>
  <button class="tab" id="tab-btn-stats" onclick="showTab('stats')">📊 สถิติ</button>
  <button class="tab" id="tab-btn-weather" onclick="showTab('weather')">☀️ อากาศ</button>
</div>

<div id="strava-section">
  <div id="client-form" class="strava-box" style="display:none">
    <label>ใส่ Strava Client ID (ดูได้ที่ strava.com/settings/api)</label>
    <input type="number" id="client-id-input" placeholder="เช่น 123456">
    <button class="btn-orange" onclick="saveAndConnect()">เชื่อมต่อ Strava →</button>
  </div>
  <button class="btn-orange" id="main-btn" onclick="connectStrava()">🔗 เชื่อมต่อ Strava</button>
  <button class="btn-ghost" id="reconnect-btn" onclick="reconnect()" style="display:none">🔄 ล้างข้อมูลและเชื่อมต่อใหม่</button>
</div>
<div id="strava-ok" class="strava-ok" style="display:none"></div>
<div id="loading" class="loading" style="display:none">⏳ กำลังดึงข้อมูลจาก Strava...</div>

<div id="tab-calendar">
  <div class="progress-box">
    <div class="progress-top">
      <span class="progress-label">ระยะทางสะสม</span>
      <span class="progress-km" id="km-display">0 / 100 KM</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-bottom">
      <span id="days-display">0 วัน / 20 วัน</span>
      <span id="remain-display">เหลือ 100 กม.</span>
    </div>
  </div>
  <div id="calendar"></div>
  <div class="summary">
    <div class="summary-card"><div class="summary-val">20</div><div class="summary-label">วันวิ่งทั้งหมด</div></div>
    <div class="summary-card"><div class="summary-val">4</div><div class="summary-label">Long Run</div></div>
    <div class="summary-card"><div class="summary-val" id="sum-strava">-</div><div class="summary-label">จาก Strava</div></div>
  </div>
  <div class="footer">กดแต่ละวันเพื่อเช็คด้วยตัวเอง · 🟠 = จาก Strava</div>
</div>

<div id="tab-stats" style="display:none">
  <div id="stats-content"><div class="no-data">🔗 เชื่อมต่อ Strava ก่อนเพื่อดูสถิติครับ</div></div>
</div>

<div id="tab-weather" style="display:none">
  <div style="text-align:center;margin-bottom:16px">
    <button class="btn-orange" style="width:auto;padding:12px 24px" onclick="loadWeather()">📍 ดูอากาศตามที่อยู่ปัจจุบัน</button>
  </div>
  <div id="weather-content"><div class="no-data">กด "ดูอากาศ" เพื่อโหลดข้อมูลครับ</div></div>
</div>

<script>
const SITE_URL = 'https://running-app-july.vercel.app';

const schedule = [
  {date:1, day:"พ", km:4, rest:false},
  {date:2, day:"พฤ", km:4, rest:false},
  {date:3, day:"ศ", km:4, rest:false},
  {date:4, day:"ส", km:0, rest:true},
  {date:5, day:"อา", km:10, rest:false, longrun:true},
  {date:6, day:"จ", km:0, rest:true},
  {date:7, day:"อ", km:3, rest:false},
  {date:8, day:"พ", km:3, rest:false},
  {date:9, day:"พฤ", km:3, rest:false},
  {date:10, day:"ศ", km:3, rest:false},
  {date:11, day:"ส", km:0, rest:true},
  {date:12, day:"อา", km:10, rest:false, longrun:true},
  {date:13, day:"จ", km:0, rest:true},
  {date:14, day:"อ", km:3, rest:false},
  {date:15, day:"พ", km:3, rest:false},
  {date:16, day:"พฤ", km:3, rest:false},
  {date:17, day:"ศ", km:3, rest:false},
  {date:18, day:"ส", km:0, rest:true},
  {date:19, day:"อา", km:10, rest:false, longrun:true},
  {date:20, day:"จ", km:0, rest:true},
  {date:21, day:"อ", km:3, rest:false},
  {date:22, day:"พ", km:3, rest:false},
  {date:23, day:"พฤ", km:3, rest:false},
  {date:24, day:"ศ", km:3, rest:false},
  {date:25, day:"ส", km:0, rest:true},
  {date:26, day:"อา", km:10, rest:false, longrun:true},
  {date:27, day:"จ", km:0, rest:true},
  {date:28, day:"อ", km:3, rest:false},
  {date:29, day:"พ", km:3, rest:false},
  {date:30, day:"พฤ", km:3, rest:false},
  {date:31, day:"ศ", km:3, rest:false},
];

const TOTAL_KM = schedule.reduce((s,d)=>s+d.km,0);
const RUN_DAYS = schedule.filter(d=>!d.rest).length;
let completed   = JSON.parse(localStorage.getItem('run-july-2026')||'{}');
let stravaRuns  = JSON.parse(localStorage.getItem('strava-runs')  ||'{}');
let stravaStats = JSON.parse(localStorage.getItem('strava-stats') ||'{}');

function saveCompleted(){ localStorage.setItem('run-july-2026',JSON.stringify(completed)); }

function showTab(name){
  ['calendar','stats','weather'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name?'block':'none';
    document.getElementById('tab-btn-'+t).classList.toggle('active',t===name);
  });
  if(name==='stats') renderStats();
}

function connectStrava(){
  const id = localStorage.getItem('strava_client_id');
  if(id){ doOAuth(id); }
  else {
    document.getElementById('client-form').style.display='block';
    document.getElementById('main-btn').style.display='none';
  }
}

function saveAndConnect(){
  const val = document.getElementById('client-id-input').value.trim();
  if(!val){ alert('กรุณาใส่ Client ID'); return; }
  localStorage.setItem('strava_client_id', val);
  doOAuth(val);
}

function doOAuth(clientId){
  const redirect = encodeURIComponent(SITE_URL+'/callback');
  window.location.href = `https://www.strava.com/oauth/authorize?client_id=${clientId}&redirect_uri=${redirect}&response_type=code&scope=activity:read`;
}

function reconnect(){
  ['strava_token','strava_client_id','strava-runs','strava-stats'].forEach(k=>localStorage.removeItem(k));
  stravaRuns={}; stravaStats={};
  document.getElementById('main-btn').textContent='🔗 เชื่อมต่อ Strava';
  document.getElementById('main-btn').className='btn-orange';
  document.getElementById('main-btn').onclick=connectStrava;
  document.getElementById('main-btn').style.display='block';
  document.getElementById('reconnect-btn').style.display='none';
  document.getElementById('strava-ok').style.display='none';
  document.getElementById('client-form').style.display='block';
  renderCalendar(); updateProgress();
}

async function syncStrava(token){
  document.getElementById('loading').style.display='block';
  try {
    const after  = Math.floor(new Date('2026-07-01T00:00:00+07:00').getTime()/1000);
    const before = Math.floor(new Date('2026-07-31T23:59:59+07:00').getTime()/1000);
    const res  = await fetch(`/api/strava-activities?token=${token}&after=${after}&before=${before}`);
    const data = await res.json();
    if(!Array.isArray(data)) throw new Error(JSON.stringify(data));
    stravaRuns={}; stravaStats={};
    let count=0;
    data.forEach(act=>{
      if(act.type!=='Run') return;
      const dateKey = parseInt(act.start_date_local.split('T')[0].split('-')[2]);
      const km = parseFloat((act.distance/1000).toFixed(2));
      stravaRuns[dateKey]  = (stravaRuns[dateKey]||0)+km;
      const prev = stravaStats[dateKey]||{km:0,time:0,calories:0};
      stravaStats[dateKey] = { km:prev.km+km, time:prev.time+(act.moving_time||0), calories:prev.calories+(act.calories||0) };
      completed[dateKey]=true;
      count++;
    });
    localStorage.setItem('strava-runs',  JSON.stringify(stravaRuns));
    localStorage.setItem('strava-stats', JSON.stringify(stravaStats));
    saveCompleted();
    document.getElementById('sum-strava').textContent=count;
    document.getElementById('strava-ok').style.display='block';
    document.getElementById('strava-ok').innerHTML='✅ เชื่อมต่อ Strava แล้ว · ดึงข้อมูลสำเร็จ';
    document.getElementById('main-btn').textContent='🔄 Sync Strava';
    document.getElementById('main-btn').className='btn-green';
    document.getElementById('main-btn').style.display='block';
    document.getElementById('main-btn').onclick=()=>syncStrava(token);
    document.getElementById('reconnect-btn').style.display='block';
    document.getElementById('client-form').style.display='none';
  } catch(e){ alert('เกิดข้อผิดพลาด: '+e.message); }
  document.getElementById('loading').style.display='none';
  renderCalendar(); updateProgress();
}

function updateProgress(){
  const doneKm   = schedule.filter(d=>!d.rest&&completed[d.date]).reduce((s,d)=>s+(stravaRuns[d.date]||d.km),0);
  const doneDays = schedule.filter(d=>!d.rest&&completed[d.date]).length;
  const pct = Math.min((doneKm/TOTAL_KM)*100,100);
  document.getElementById('km-display').textContent    = doneKm.toFixed(1)+' / '+TOTAL_KM+' KM';
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('days-display').textContent  = doneDays+' วัน / '+RUN_DAYS+' วัน';
  document.getElementById('remain-display').textContent= 'เหลือ '+Math.max(0,TOTAL_KM-doneKm).toFixed(1)+' กม.';
}

function renderCalendar(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';
  for(let i=0;i<schedule.length;i+=7){
    const week=document.createElement('div');
    week.className='week';
    schedule.slice(i,i+7).forEach(d=>{
      const done=!!completed[d.date], fromS=!!stravaRuns[d.date];
      const btn=document.createElement('button');
      btn.className='day-btn';
      if(d.rest)         btn.style.cssText='background:#141420;border:1px solid #1e1e2e;cursor:default;';
      else if(done)      btn.style.cssText='background:linear-gradient(135deg,#ff6b35,#ffa040);border:none;transform:scale(1.03);';
      else if(d.longrun) btn.style.cssText='background:#1a1810;border:1px solid #ffd70066;';
      else               btn.style.cssText='background:#1a1a24;border:1px solid #2a2a38;';
      const nc=d.rest?'#444':done?'rgba(255,255,255,.8)':'#666';
      const dc=d.rest?'#333':done?'#fff':'#ccc';
      const kc=d.rest?'#333':done?'#fff':d.longrun?'#ffd700':'#ff6b35';
      const showKm=fromS?stravaRuns[d.date].toFixed(1):d.km;
      btn.innerHTML=`
        <div class="day-name" style="color:${nc}">${d.day}</div>
        <div class="day-num"  style="color:${dc}">${d.date}</div>
        <div class="day-km"   style="color:${kc}">${d.rest?'พัก':showKm+' กม.'}</div>
        ${d.longrun&&!done?'<div class="day-long">LONG RUN</div>':''}
        ${fromS?'<div style="font-size:10px;color:#fc4c02;margin-top:2px">🟠</div>':''}
        ${done&&!fromS?'<div style="font-size:14px;margin-top:2px">✓</div>':''}`;
      if(!d.rest) btn.onclick=()=>{completed[d.date]=!completed[d.date];saveCompleted();renderCalendar();updateProgress();};
      week.appendChild(btn);
    });
    cal.appendChild(week);
  }
}

function formatPace(s){ if(!s||s<=0)return'-'; return Math.floor(s/60)+':'+(Math.round(s%60)).toString().padStart(2,'0'); }
function formatTime(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}ชม. ${m}น.`:`${m} น.`; }

function renderStats(){
  const sc=document.getElementById('stats-content');
  const dates=Object.keys(stravaStats).map(Number);
  if(!dates.length){sc.innerHTML='<div class="no-data">🔗 เชื่อมต่อ Strava ก่อนเพื่อดูสถิติครับ</div>';return;}
  const totalKm  =dates.reduce((s,d)=>s+stravaStats[d].km,0);
  const totalCal =dates.reduce((s,d)=>s+(stravaStats[d].calories||0),0);
  const totalTime=dates.reduce((s,d)=>s+stravaStats[d].time,0);
  const avgPace  =totalTime/totalKm;
  let bD=null,wD=null,bP=Infinity,wP=0;
  dates.forEach(d=>{const p=stravaStats[d].time/stravaStats[d].km;if(p<bP){bP=p;bD=d;}if(p>wP){wP=p;wD=d;}});
  sc.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${totalKm.toFixed(1)}<span class="stat-unit">กม.</span></div><div class="stat-label">ระยะทางรวม</div></div>
      <div class="stat-card"><div class="stat-val">${formatPace(avgPace)}<span class="stat-unit">น./กม.</span></div><div class="stat-label">Pace เฉลี่ย</div></div>
      <div class="stat-card"><div class="stat-val">${Math.round(totalCal).toLocaleString()}<span class="stat-unit">cal</span></div><div class="stat-label">แคลอรี่สะสม</div></div>
      <div class="stat-card"><div class="stat-val">${formatTime(totalTime)}</div><div class="stat-label">เวลาวิ่งรวม</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">ระยะทางรายวัน (กม.)</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
    <div class="best-worst">
      <div class="bw-card"><div class="bw-title">🏆 วิ่งเร็วที่สุด</div><div class="bw-val" style="color:#ffd700">${bD?formatPace(bP):'-'}</div><div class="bw-sub">${bD?'วันที่ '+bD+' มิ.ย.':''}</div></div>
      <div class="bw-card"><div class="bw-title">🐢 วิ่งช้าที่สุด</div><div class="bw-val" style="color:#888">${wD?formatPace(wP):'-'}</div><div class="bw-sub">${wD?'วันที่ '+wD+' มิ.ย.':''}</div></div>
    </div>`;
  const maxKm=Math.max(...schedule.map(d=>stravaRuns[d.date]||0),1);
  const chart=document.getElementById('bar-chart');
  chart.innerHTML='';
  schedule.forEach(d=>{
    const km=stravaRuns[d.date]||0;
    const pct=d.rest?8:Math.max((km/maxKm)*100,2);
    const w=document.createElement('div');
    w.className='bar-wrap';
    w.innerHTML=`<div class="bar${d.rest?' rest':''}" style="height:${pct}%"></div><div class="bar-label">${d.date}</div>`;
    chart.appendChild(w);
  });
}

function loadWeather(){
  const wc=document.getElementById('weather-content');
  wc.innerHTML='<div class="loading">⏳ กำลังโหลดสภาพอากาศ...</div>';
  navigator.geolocation.getCurrentPosition(async pos=>{
    try {
      const {latitude:lat,longitude:lon}=pos.coords;
      const res=await fetch(`/api/weather?lat=${lat}&lon=${lon}`);
      const data=await res.json();
      const {time:dates,temperature_2m_max:temps,precipitation_sum:rains,windspeed_10m_max:winds}=data.daily;
      let html='';
      dates.forEach((dt,i)=>{
        const day=parseInt(dt.split('-')[2]);
        const s=schedule.find(x=>x.date===day);
        const temp=temps[i],rain=rains[i],wind=winds[i];
        let icon='☀️',tag='<span class="weather-tag tag-good">เหมาะวิ่ง</span>';
        if(rain>5){icon='🌧️';tag='<span class="weather-tag tag-rain">ฝนตก</span>';}
        else if(rain>0.5){icon='🌦️';tag='<span class="weather-tag tag-rain">ฝนปรอย</span>';}
        else if(temp>35){icon='🥵';tag='<span class="weather-tag tag-hot">ร้อนมาก</span>';}
        else if(temp>32){icon='☀️';tag='<span class="weather-tag tag-hot">ร้อน</span>';}
        else if(wind>30){icon='💨';tag='<span class="weather-tag tag-wind">ลมแรง</span>';}
        const rest=s&&s.rest?' <span style="color:#555;font-size:11px">(พัก)</span>':'';
        html+=`<div class="weather-bar"><div class="weather-date">${day}</div><div class="weather-icon-lg">${icon}</div><div class="weather-info"><div class="weather-temp">${temp}°C · ฝน ${rain}มม.${rest}</div><div class="weather-detail">ลม ${wind} กม./ชม.</div></div>${tag}</div>`;
      });
      wc.innerHTML=html;
    } catch(e){wc.innerHTML='<div class="no-data">โหลดข้อมูลไม่ได้ครับ</div>';}
  },()=>{wc.innerHTML='<div class="no-data">ไม่ได้รับอนุญาตให้เข้าถึงตำแหน่งครับ</div>';});
}

// OAuth callback
const params=new URLSearchParams(window.location.search);
const code=params.get('code');
if(code){
  history.replaceState({},'','/');
  fetch(`/api/strava-token?code=${code}`)
    .then(r=>r.json())
    .then(data=>{
      if(data.access_token){
        localStorage.setItem('strava_token',data.access_token);
        syncStrava(data.access_token);
      } else { alert('เชื่อมต่อไม่สำเร็จ: '+JSON.stringify(data)); }
    });
} else {
  const token=localStorage.getItem('strava_token');
  if(token){
    document.getElementById('main-btn').textContent='🔄 Sync Strava';
    document.getElementById('main-btn').className='btn-green';
    document.getElementById('main-btn').onclick=()=>syncStrava(token);
    document.getElementById('reconnect-btn').style.display='block';
    document.getElementById('strava-ok').style.display='block';
    document.getElementById('strava-ok').innerHTML='✅ เชื่อมต่อ Strava แล้ว';
    document.getElementById('sum-strava').textContent=Object.keys(stravaRuns).length;
  }
}
renderCalendar();
updateProgress();
</script>
